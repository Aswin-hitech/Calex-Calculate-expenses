{% extends 'base.html' %}
{% block title %}Profile · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
        <div class="glass-card">
            <h2 class="page-title">Profile</h2>
            <form method="POST" enctype="multipart/form-data" class="row g-3">
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ user.email }}"></div>
                <div class="col-md-6"><label class="form-label">Username</label><input type="text" name="username" class="form-control" value="{{ user.username }}"></div>
                <div class="col-12"><label class="form-label">Profile image</label><input type="file" name="profile_image" class="form-control"></div>
                <div class="col-12"><button class="btn btn-primary" type="submit">Save profile</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
