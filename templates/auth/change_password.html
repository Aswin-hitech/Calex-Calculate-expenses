{% extends 'base.html' %}
{% block title %}Change Password · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card">
            <h2 class="page-title">Change password</h2>
            <form method="POST" class="vstack gap-3">
                <div><label class="form-label">Current password</label><input type="password" name="current_password" class="form-control" required></div>
                <div><label class="form-label">New password</label><input type="password" name="new_password" class="form-control" required></div>
                <button class="btn btn-primary" type="submit">Update password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
