{% extends 'base.html' %}
{% block title %}Forgot Password · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="glass-card">
            <h2 class="page-title">Forgot password</h2>
            <p class="subtle">Enter your email to generate a reset token.</p>
            <form method="POST" class="vstack gap-3">
                <div>
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Generate token</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
