{% extends 'base.html' %}
{% block title %}Login · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="glass-card hero-card">
            <span class="section-label mb-3">Secure Sign In</span>
            <div class="mb-4">
                <h2 class="page-title mb-1">Welcome back</h2>
                <p class="subtle mb-0">Sign in to continue managing your money.</p>
            </div>
            <form method="POST" class="vstack gap-3">
                <div>
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div>
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-check-label subtle"><input class="form-check-input me-2" type="checkbox" name="remember">Remember me</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="subtle text-decoration-none">Forgot password?</a>
                </div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
