{% extends 'base.html' %}
{% block title %}Add Income · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-7 col-lg-8">
        <div class="glass-card">
            <div class="toolbar">
                <div>
                    <h1 class="page-title mb-2">Add income</h1>
                    <p class="subtle mb-0">Record salary, freelance, or any other cash inflow.</p>
                </div>
                <a href="{{ url_for('income.list_income') }}" class="btn btn-soft">Back</a>
            </div>
            <form method="POST" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="entry_date" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Source</label>
                    <input type="text" name="source" class="form-control" placeholder="Salary, Freelance" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" min="0" name="amount" class="form-control" placeholder="0.00" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Optional context"></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Save income</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
