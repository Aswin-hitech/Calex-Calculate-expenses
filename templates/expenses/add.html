{% extends 'base.html' %}
{% block title %}Add Expense · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-8 col-lg-9">
        <div class="glass-card">
            <div class="toolbar">
                <div>
                    <h1 class="page-title mb-2">Add expense</h1>
                    <p class="subtle mb-0">Record a purchase with optional notes and attachment.</p>
                </div>
                <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-soft">Back to ledger</a>
            </div>
            <form method="POST" enctype="multipart/form-data" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="entry_date" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" placeholder="Food, Travel, Bills" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" min="0" name="amount" class="form-control" placeholder="0.00" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="What was this expense for?"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tags</label>
                    <input type="text" name="tags" class="form-control" placeholder="food, office, urgent">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment method</label>
                    <input type="text" name="payment_method" class="form-control" placeholder="Cash, UPI, Card">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="Store, city, online">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Attachment</label>
                    <input type="file" name="attachment" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2" placeholder="Optional extra context"></textarea>
                    <div class="form-hint mt-2">Attachments are stored on the server's static/uploads folder.</div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save expense</button>
                    <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-soft">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
