{% extends 'base.html' %}
{% block title %}Edit Expense · Calex - Calculate Your Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-8 col-lg-9">
        <div class="glass-card">
            <div class="toolbar">
                <div>
                    <h1 class="page-title mb-2">Edit expense</h1>
                    <p class="subtle mb-0">Update the fields and save the corrected record.</p>
                </div>
                <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-soft">Back to ledger</a>
            </div>
            <form method="POST" enctype="multipart/form-data" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="entry_date" class="form-control" value="{{ expense.entry_date.isoformat() if expense.entry_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" value="{{ expense.category }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" min="0" name="amount" class="form-control" value="{{ expense.amount }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ expense.description or '' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tags</label>
                    <input type="text" name="tags" class="form-control" value="{{ expense.tags or '' }}" placeholder="food, office, urgent">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment method</label>
                    <input type="text" name="payment_method" class="form-control" value="{{ expense.payment_method or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" value="{{ expense.location or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Attachment</label>
                    <input type="file" name="attachment" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2">{{ expense.notes or '' }}</textarea>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Update expense</button>
                    <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-soft">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
