{% extends 'base.html' %}
{% block title %}Edit Budget · Calex {% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-7 col-lg-8">
        <div class="glass-card">
            <div class="toolbar">
                <div>
                    <h1 class="page-title mb-2">Edit budget</h1>
                    <p class="subtle mb-0">Adjust the limit or change the budget category.</p>
                </div>
                <a href="{{ url_for('budgets.list_budgets') }}" class="btn btn-soft">Back</a>
            </div>
            <form method="POST" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Month</label>
                    <input type="month" name="month" class="form-control" value="{{ budget.month.strftime('%Y-%m') if budget.month else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" value="{{ budget.category or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Total amount</label>
                    <input type="number" step="0.01" min="0" name="total_amount" class="form-control" value="{{ budget.total_amount }}" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Update budget</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
