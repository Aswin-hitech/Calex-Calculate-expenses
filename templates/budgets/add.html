{% extends 'base.html' %}
{% block title %}Add Budget · Calex {% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-7 col-lg-8">
        <div class="glass-card">
            <div class="toolbar">
                <div>
                    <h1 class="page-title mb-2">Add budget</h1>
                    <p class="subtle mb-0">Set a monthly cap for all spending or a single category.</p>
                </div>
                <a href="{{ url_for('budgets.list_budgets') }}" class="btn btn-soft">Back</a>
            </div>
            <form method="POST" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Month</label>
                    <input type="month" name="month" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" placeholder="Optional category">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Total amount</label>
                    <input type="number" step="0.01" min="0" name="total_amount" class="form-control" placeholder="0.00" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Save budget</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
